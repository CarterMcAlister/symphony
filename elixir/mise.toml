[tools]
erlang = "28"
elixir = "1.19.5-otp-28"

[env]
_.file = ".env"

[tasks.setup]
description = "Install Elixir dependencies"
run = "mix setup"

[tasks.dev]
description = "Run Symphony through the Phoenix dev server with the default workflow"
depends = ["setup"]
run = "mix phx.server"

[tasks.build]
description = "Build the Symphony escript"
run = "mix build"

[tasks.start]
description = "Start Symphony with the local WORKFLOW.md"
run = "./bin/symphony ./WORKFLOW.md"

[tasks.test]
description = "Run the test suite"
run = "mix test"

[tasks.start-dashboard]
description = "Start Symphony with the observability dashboard on port 4000"
run = "./bin/symphony ./WORKFLOW.md --port 4000"
